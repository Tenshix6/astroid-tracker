name: Asteroid Tracker 
on:
  schedule:
  - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo 
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
        
      - name: install packages
        run: |
          pip install requests
          pip install discord-webhook
        
      - name: run asteroid tracker
        run: python asteroid_tracker.py
